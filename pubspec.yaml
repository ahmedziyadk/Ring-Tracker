name: ring_tracker
description: A gemstone order tracking app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  image_picker: ^1.1.2
  provider: ^6.1.1
  intl: ^0.19.0
  pdf: ^3.10.8
  printing: ^5.12.0
  http: ^1.2.0
  cupertino_icons: ^1.0.2
  share_plus: ^10.0.0
  path_provider: ^2.1.2
  url_launcher: ^6.3.1
  android_intent_plus: ^5.3.0
  flutter_contacts: ^2.0.2
  receive_sharing_intent: ^1.8.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  web:
    generate: true
    image_path: "assets/logo.png"
